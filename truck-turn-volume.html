<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>トラッ角解析</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #dfe5ea;
      --sheet: rgba(245, 248, 250, .68);
      --panel: rgba(247, 250, 252, .66);
      --panel-2: rgba(255, 255, 255, .58);
      --panel-3: rgba(236, 241, 245, .72);
      --surface-glass: rgba(247, 250, 252, .68);
      --surface-glass-strong: rgba(250, 252, 253, .84);
      --line: rgba(124, 137, 148, .22);
      --line-strong: rgba(74, 88, 101, .34);
      --line-soft: rgba(255, 255, 255, .58);
      --text: #111721;
      --muted: #4a5563;
      --quiet: #687381;
      --subtle: #8d97a3;
      --accent: #b7ff2f;
      --accent-hover: #d7ff84;
      --accent-2: #18b7aa;
      --warn: #ff756b;
      --road: #dfe5e9;
      --amber: #18b7aa;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 22px 58px rgba(62, 74, 86, .18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      font-family: Inter, "SF Pro Text", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.92), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(245,249,252,.86), transparent 32%),
        linear-gradient(135deg, rgba(255,255,255,.7), rgba(194,205,216,.62)),
        var(--bg);
      color: var(--text);
      overflow: hidden;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(356px, 428px) minmax(0, 1fr);
      height: calc(100vh - 36px);
      border: 1px solid rgba(255, 255, 255, .82);
      border-radius: 18px;
      background: var(--sheet);
      box-shadow: 0 32px 82px rgba(74, 88, 101, .22);
      backdrop-filter: blur(22px) saturate(150%);
      overflow: hidden;
    }

    aside {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid rgba(126, 140, 154, .24);
      background: var(--panel);
      backdrop-filter: blur(22px) saturate(145%);
    }

    header {
      position: relative;
      padding: 28px 24px 18px;
      border-bottom: 0;
    }

    header::before {
      display: none;
    }

    .header-kicker {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1;
      font-weight: 700;
      color: var(--text);
    }

    .header-kicker::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      flex: 0 0 auto;
    }

    .language-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      min-width: 54px;
      min-height: 34px;
      padding: 0 13px;
      font-weight: 800;
      color: #050505;
    }

    .language-toggle.is-jp {
      background: var(--accent);
    }

    .language-toggle.is-cn {
      background: rgba(255, 255, 255, .82);
    }

    .brand-term {
      font-weight: 820;
    }

    h1 {
      margin: 0 0 12px;
      max-width: 18em;
      font-size: 40px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 820;
      text-transform: none;
    }

    .subtitle {
      margin: 0;
      max-width: 31em;
      color: var(--quiet);
      font-size: 12px;
      line-height: 1.55;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 4px 20px 18px;
      border-bottom: 0;
      background: transparent;
    }

    .metric {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: 16px 16px 14px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 12px;
      background: rgba(255, 255, 255, .46);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 8px 24px rgba(78, 92, 106, .07);
      backdrop-filter: blur(16px) saturate(140%);
    }

    .metric > * {
      position: relative;
      z-index: 1;
    }

    .metric--ratio {
      --ratio-fill: 0%;
      background:
        linear-gradient(90deg, rgba(183, 255, 47, .88) 0 var(--ratio-fill), rgba(255, 255, 255, .46) var(--ratio-fill) 100%);
      transition: background .22s ease;
    }

    .metric--ratio::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.36), transparent 60%);
      pointer-events: none;
    }

    .metric strong {
      display: flex;
      align-items: baseline;
      min-height: 23px;
      margin-bottom: 6px;
      font-size: 27px;
      line-height: 1.1;
      font-weight: 820;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      color: var(--quiet);
      font-size: 13px;
      line-height: 1.4;
      text-transform: none;
    }

    .controls {
      overflow-y: auto;
      padding: 2px 18px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--line-strong) transparent;
    }

    .controls::-webkit-scrollbar,
    .volume-library::-webkit-scrollbar {
      width: 10px;
    }

    .controls::-webkit-scrollbar-track,
    .volume-library::-webkit-scrollbar-track {
      background: transparent;
    }

    .controls::-webkit-scrollbar-thumb,
    .volume-library::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: var(--line-strong);
      background-clip: padding-box;
    }

    details {
      margin: 0 0 12px;
      padding: 12px 14px 14px;
      border: 1px solid rgba(255, 255, 255, .7);
      border-radius: 14px;
      background: rgba(255, 255, 255, .42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.76), 0 10px 28px rgba(78, 92, 106, .06);
      backdrop-filter: blur(16px) saturate(145%);
    }

    summary {
      cursor: pointer;
      list-style: none;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 12px;
      font-weight: 720;
      color: var(--text);
      letter-spacing: 0;
      text-transform: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::after {
      content: "+";
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border: 1px solid rgba(128, 141, 154, .26);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-weight: 900;
      background: rgba(255,255,255,.5);
    }

    details[open] summary::after {
      content: "-";
    }

    .control {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 84px;
      gap: 8px 12px;
      align-items: center;
      margin-top: 12px;
    }

    label {
      min-width: 0;
      color: var(--quiet);
      font-size: 11px;
      line-height: 1.45;
    }

    .value {
      justify-self: end;
      width: 84px;
      min-height: 34px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,.54);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .value:hover,
    .lookup input:hover,
    .lookup-text:hover,
    .saved-volume input[type="text"]:hover {
      border-color: var(--line-strong);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--subtle);
      opacity: .5;
    }

    input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), rgba(141, 153, 165, .18));
    }

    input[type="range"]::-webkit-slider-thumb {
      margin-top: -7px;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 42px;
      margin-top: 9px;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .lookup {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }

    .lookup input {
      min-width: 0;
      height: 40px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }

    .lookup-text {
      width: 100%;
      min-height: 96px;
      margin-top: 10px;
      padding: 10px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel-2);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      line-height: 1.45;
    }

    .lookup-status {
      margin: 8px 0 0;
      color: var(--quiet);
      font-size: 12px;
      line-height: 1.5;
    }

    .lookup-footer {
      align-items: end;
      margin-top: 10px;
    }

    .lookup-footer .lookup-status {
      margin: 0;
      align-self: end;
    }

    input:focus-visible,
    textarea:focus-visible,
    summary:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: rgba(93, 105, 118, .4);
    }

    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      padding: 18px;
      background:
        radial-gradient(circle at 42% 32%, rgba(255,255,255,.88), transparent 38%),
        linear-gradient(135deg, rgba(255,255,255,.28), rgba(217,225,232,.46));
    }

    #scene {
      display: block;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(126, 140, 154, .22);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(133,145,156,.12) 1px, transparent 1px),
        linear-gradient(rgba(133,145,156,.12) 1px, transparent 1px),
        rgba(245, 248, 250, .42);
      background-size: 28px 28px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.78), 0 18px 48px rgba(80, 94, 108, .12);
    }

    .legend {
      position: absolute;
      left: 20px;
      bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      max-width: calc(100% - 40px);
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 12px;
      background: rgba(247, 250, 252, .66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(145%);
      color: var(--text);
      font-size: 12px;
    }

    .legend i {
      display: inline-block;
      width: 11px;
      height: 11px;
      margin-right: 6px;
      border-radius: 3px;
      vertical-align: -1px;
    }

    .toolbar {
      position: absolute;
      top: 32px;
      right: 34px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      min-height: 40px;
      padding: 0 15px;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 10px;
      background: rgba(247, 250, 252, .62);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      font-weight: 650;
      text-transform: none;
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color .16s ease, background .16s ease, color .16s ease, transform .16s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.86), 0 8px 20px rgba(76, 90, 104, .12);
      backdrop-filter: blur(16px) saturate(145%);
    }

    button svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    button:hover {
      border-color: rgba(255,255,255,.95);
      background: rgba(255,255,255,.78);
      color: var(--text);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: default;
      opacity: .5;
    }

    button.is-active {
      border-color: rgba(255,255,255,.95);
      background: var(--accent);
      color: var(--text);
    }

    .status {
      display: none;
      position: absolute;
      top: 32px;
      left: 34px;
      max-width: min(520px, calc(100% - 36px));
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 14px;
      background: rgba(247, 250, 252, .66);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(145%);
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
    }

    .axis-gizmo {
      position: absolute;
      top: 32px;
      left: 34px;
      z-index: 18;
      width: 108px;
      height: 108px;
      border: 1px solid rgba(68, 78, 88, .28);
      border-radius: 18px;
      background: rgba(99, 112, 124, .24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.42), 0 16px 38px rgba(64, 76, 88, .18);
      backdrop-filter: blur(18px) saturate(145%);
      pointer-events: none;
      overflow: hidden;
    }

    .axis-gizmo canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .volume-viewer {
      position: absolute;
      inset: 18px;
      z-index: 50;
      display: none;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(133,145,156,.12) 1px, transparent 1px),
        linear-gradient(rgba(133,145,156,.12) 1px, transparent 1px),
        rgba(247,250,252,.72);
      background-size: 28px 28px;
      box-shadow: 0 28px 70px rgba(80, 94, 108, .22);
      backdrop-filter: blur(18px) saturate(145%);
      overflow: hidden;
    }

    .volume-viewer.is-open {
      display: block;
    }

    .volume-viewer canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .volume-viewer__bar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .volume-viewer__title {
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 12px;
      background: rgba(247, 250, 252, .66);
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      backdrop-filter: blur(18px) saturate(145%);
      pointer-events: auto;
    }

    .volume-viewer__actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .volume-library {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 24;
      width: min(340px, calc(100% - 40px));
      max-height: 320px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 14px;
      background: rgba(247, 250, 252, .68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(145%);
      color: var(--text);
      font-size: 12px;
    }

    .volume-library[open] {
      overflow-y: auto;
    }

    .volume-library > summary {
      min-height: 42px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(126, 140, 154, .16);
      color: var(--text);
    }

    .volume-library__body {
      display: grid;
      gap: 10px;
      padding: 11px;
    }

    .volume-library__actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .volume-library__list {
      display: grid;
      gap: 7px;
    }

    .saved-volume {
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 10px;
      background: rgba(255, 255, 255, .38);
    }

    .saved-volume summary {
      min-height: 38px;
      padding: 0 9px;
      font-size: 12px;
      font-weight: 620;
      color: var(--text);
    }

    .saved-volume__content {
      display: grid;
      gap: 8px;
      padding: 0 9px 9px;
    }

    .saved-volume input[type="text"] {
      width: 100%;
      min-height: 34px;
      border: 1px solid rgba(126, 140, 154, .2);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 0 9px;
      font: inherit;
      font-size: 12px;
    }

    .saved-volume__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--subtle);
      font-variant-numeric: tabular-nums;
    }

    .saved-volume__buttons {
      display: flex;
      gap: 8px;
    }

    .saved-volume__buttons button,
    .volume-library__actions button,
    .heatmap-viewer__actions button,
    .mini-volume-viewer__actions button {
      min-height: 34px;
      padding: 0 10px;
      font-size: 12px;
    }

    .mini-volume-viewer,
    .heatmap-viewer {
      position: absolute;
      z-index: 55;
      display: none;
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 16px;
      background:
        linear-gradient(90deg, rgba(133,145,156,.12) 1px, transparent 1px),
        linear-gradient(rgba(133,145,156,.12) 1px, transparent 1px),
        rgba(247,250,252,.74);
      background-size: 28px 28px;
      box-shadow: 0 28px 70px rgba(80, 94, 108, .22);
      backdrop-filter: blur(18px) saturate(145%);
      overflow: hidden;
    }

    .mini-volume-viewer.is-open,
    .heatmap-viewer.is-open {
      display: block;
    }

    .mini-volume-viewer {
      right: 20px;
      bottom: 358px;
      width: min(340px, calc(100% - 40px));
      height: 240px;
    }

    .heatmap-viewer {
      inset: 8% 8% 10%;
    }

    .mini-volume-viewer canvas,
    .heatmap-viewer canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .mini-volume-viewer__bar,
    .heatmap-viewer__bar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .mini-volume-viewer__title,
    .heatmap-viewer__title,
    .heatmap-viewer__controls {
      border: 1px solid rgba(255, 255, 255, .84);
      border-radius: 12px;
      background: rgba(247, 250, 252, .66);
      color: var(--text);
      font-size: 12px;
      backdrop-filter: blur(18px) saturate(145%);
      pointer-events: auto;
    }

    .mini-volume-viewer__title,
    .heatmap-viewer__title {
      padding: 8px 10px;
      line-height: 1.35;
    }

    .mini-volume-viewer__actions,
    .heatmap-viewer__actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .heatmap-viewer__controls {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
    }

    .heatmap-viewer__controls input[type="range"] {
      width: 100%;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
        animation-duration: .01ms !important;
      }
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
        padding: 12px;
      }

      .app {
        grid-template-columns: 1fr;
        height: auto;
      }

      aside {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        height: 70vh;
        min-height: 520px;
      }

      .toolbar,
      .status {
        left: 14px;
        right: 14px;
        max-width: none;
      }

      .toolbar {
        top: auto;
        bottom: 84px;
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .status {
        top: 14px;
      }

      .axis-gizmo {
        top: 14px;
        left: 14px;
        width: 92px;
        height: 92px;
      }

      .legend {
        left: 14px;
        right: 14px;
        bottom: 14px;
        max-width: none;
      }

      .volume-viewer {
        inset: 10px;
      }

      .volume-viewer__bar {
        align-items: flex-start;
        flex-direction: column;
      }

      .volume-library {
        left: 14px;
        right: 14px;
        bottom: 150px;
        width: auto;
        max-height: 230px;
      }

      .mini-volume-viewer {
        left: 14px;
        right: 14px;
        bottom: 392px;
        width: auto;
        height: 220px;
      }

      .heatmap-viewer {
        inset: 12px;
      }

      .heatmap-viewer__bar {
        align-items: flex-start;
        flex-direction: column;
      }

      .heatmap-viewer__controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <header>
        <div class="header-kicker" id="brandKicker">トラッ角</div>
        <button class="language-toggle is-jp" id="languageToggle" type="button" aria-label="言語切替">JP</button>
        <h1>トラッ角演示</h1>

    function updateTopCameraProjection() {

      const aspect = rect.width / Math.max(1, rect.height);
      const halfHeight = 11.5;
      topCamera.left = -halfHeight * aspect;
      topCamera.right = halfHeight * aspect;
      topCamera.top = halfHeight;
      topCamera.bottom = -halfHeight;
      topCamera.updateProjectionMatrix();
    }

    function setTopView(active) {
      topViewActive = active;
      activeCamera = topViewActive ? topCamera : camera;
      controls.object = activeCamera;
      controls.enableRotate = !topViewActive;

      document.querySelector("#topViewCamera")?.classList.toggle("is-active", topViewActive);
      if (topViewActive) {
        updateTopCameraProjection();
        const target = topViewTarget();
        topCamera.position.set(target.x, 28, target.z);
        controls.target.copy(target);
        topCamera.lookAt(target);
      } else {
        controls.maxPolarAngle = Math.PI * 0.49;
      }
      controls.update();
    }

    }

      const radius = Math.max(size.x, size.y, size.z, 1);
      controlsToFit.target.copy(center);
      cameraToFit.position.set(
        center.x + radius * 1.45,
        center.y + radius * 1.15,
        center.z + radius * 1.45
      );
      cameraToFit.near = Math.max(0.01, radius / 100);
      cameraToFit.far = Math.max(120, radius * 14);
      cameraToFit.updateProjectionMatrix();
      controlsToFit.update();
    }

    function fitRemainingViewerCamera(mesh) {
      const box = new THREE.Box3().setFromObject(mesh);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z, 1);
      remainingControls.target.copy(center);
      remainingCamera.position.set(
        center.x + radius * 1.45,
        center.y + radius * 1.15,
        center.z + radius * 1.45
      );
      remainingCamera.near = Math.max(0.01, radius / 100);
      remainingCamera.far = Math.max(80, radius * 12);
      remainingCamera.updateProjectionMatrix();
      remainingControls.update();
    }

    function cloneCells(cells) {
      return cells.map(cell => ({
        x: cell.x,
        y: cell.y,
        z: cell.z,
        ix: cell.ix,
        iy: cell.iy,
        iz: cell.iz
      }));
    }

    function cloneVoxelResult(result) {
      return {
        remaining: cloneCells(result.remaining),
        occupied: cloneCells(result.occupied),
        totalCells: result.totalCells,
        sampleFrames: result.sampleFrames,
        dx: result.dx,
        dPlaneY: result.dPlaneY,
        dy: result.dy,
        totalVolume: result.totalVolume,
        cutVolume: result.cutVolume,
        remainVolume: result.remainVolume,
        chamferX: state.chamferX,
        chamferY: state.chamferY,
        prismHeight: state.prismHeight
      };
    }

    function currentVolumeSnapshot() {
      const result = computeVoxelResult();
      return cloneVoxelResult(result);

    function heatmapThresholdCount() {
      const total = savedVolumes.length;
      if (!total) return 1;
      const level = Number(heatmapViewer.threshold.value);
      return 1 + Math.round(level / 10 * Math.max(0, total - 1));
    }

    function heatmapColor(count, maxCount) {
      const t = maxCount <= 1 ? 0 : (count - 1) / (maxCount - 1);
      const color = new THREE.Color(0xb8ff2f);
      color.lerp(new THREE.Color(0xff625a), t);
      return color;
    }

    function aggregateSavedVolumes() {
      if (!savedVolumes.length) return null;
      const dx = Math.max(...savedVolumes.map(item => item.result.dx));
      const dy = Math.max(...savedVolumes.map(item => item.result.dy));
      const dz = Math.max(...savedVolumes.map(item => item.result.dPlaneY));
      const buckets = new Map();

      for (const item of savedVolumes) {
        const localKeys = new Set();
        for (const cell of item.result.remaining) {
          const ix = Math.floor(cell.x / dx);
          const iy = Math.floor(cell.y / dy);
          const iz = Math.floor(cell.z / dz);
          localKeys.add(`${ix},${iy},${iz}`);
        }
        for (const key of localKeys) {
          let bucket = buckets.get(key);
          if (!bucket) {
            const [ix, iy, iz] = key.split(",").map(Number);
            bucket = { ix, iy, iz, x: (ix + 0.5) * dx, y: (iy + 0.5) * dy, z: (iz + 0.5) * dz, count: 0 };
            buckets.set(key, bucket);
          }
          bucket.count++;
        }
      }

      return {
        cells: [...buckets.values()],
        dx,
        dy,
        dz,
        maxCount: savedVolumes.length
      };
    }

    function updateHeatmapThresholdLabel() {
      const threshold = heatmapThresholdCount();
      const label = heatmapViewer.thresholdLabel.parentElement;
      if (label?.firstChild) label.firstChild.textContent = tr("thresholdPrefix");
      heatmapViewer.thresholdLabel.textContent = `≥ ${threshold} / ${savedVolumes.length}`;
    }

    function openHeatmapViewer() {

    }

    function refreshHeatmapViewer(resetView = false) {
      updateHeatmapThresholdLabel();
      if (!heatmapViewer.isOpen) return;
      clearRenderGroup(heatmapGroup, true);
      latestHeatmap = aggregateSavedVolumes();
      if (!latestHeatmap) return;
      heatmapViewer.title.textContent = tr("heatmapTitleWithCount", savedVolumes.length);

      let fitMesh = null;
      for (let count = 1; count <= latestHeatmap.maxCount; count++) {
        const cells = latestHeatmap.cells.filter(cell => cell.count === count);
        if (!cells.length) continue;
        const material = new THREE.MeshBasicMaterial({
          color: heatmapColor(count, latestHeatmap.maxCount),
          transparent: true,
          opacity: 0.28 + 0.36 * (count / latestHeatmap.maxCount),
          depthWrite: false,
          side: THREE.DoubleSide
        });
        const mesh = voxelSurfaceMesh(cells, latestHeatmap.dx, latestHeatmap.dy, latestHeatmap.dz, material);
        heatmapGroup.add(mesh);
        if (!fitMesh) fitMesh = mesh;
      }

      if (resetView && fitMesh) fitCameraToObject(heatmapGroup, heatmapCamera, heatmapControls);
    }

    function exportHeatmapStl() {
      const heatmap = latestHeatmap || aggregateSavedVolumes();
      if (!heatmap) return;
      const threshold = heatmapThresholdCount();
      const cells = heatmap.cells.filter(cell => cell.count >= threshold);
      if (!cells.length) return;
      const triangles = voxelSurfaceTriangles(cells, heatmap.dx, heatmap.dy, heatmap.dz);
      exportTrianglesAsStl(triangles, `remaining_overlap_threshold_${threshold}.stl`, `remaining overlap threshold ${threshold}, units: meters`);
    }

    function makeBox(length, height, width, pose, baseY, material) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(length, height, width), material);
      mesh.position.set(pose.cx, baseY + height / 2, pose.cz);
      mesh.rotation.y = -pose.heading;
      return mesh;
    }

    function makeSweptBox(length, height, width, pose, baseY) {
      const mesh = makeBox(length, height, width, pose, baseY, materials.swept);
      mesh.renderOrder = 5;
      return mesh;
    }

    function cabLength() {
      return state.cabLength;
    }

    function trailerLength() {
      return state.trailerLength;
    }

    function cabWheelbase() {
      return Math.max(0.4, state.cabLength - state.cabFrontOverhang - state.cabRearOverhang);
    }

    function trailerWheelbase() {
      return Math.max(0.4, state.trailerLength - state.trailerFrontOverhang - state.trailerRearOverhang);
    }

    function outerWidth(width) {
      return width + state.sideProtrusion * 2;
    }

    function centerFromHitch(hitch, heading, localOffset) {
      return {
        cx: hitch.x + Math.cos(heading) * localOffset,
        cz: hitch.z + Math.sin(heading) * localOffset,
        heading
      };
    }

    function cargoPose(pose) {
      const cargoLength = Math.min(state.cargoLength, trailerLength());
      return centerFromHitch(pose.hitch, pose.trailerHeading, state.cargoFrontOverhang - cargoLength / 2);
    }

    function pathLength() {
      return state.turnRadius * Math.PI / 2 + Math.max(0, state.stopY);
    }

    function pathPointAtDistance(distance) {
      const radius = state.turnRadius;
      const arcLength = radius * Math.PI / 2;
      if (distance <= arcLength) {
        const angle = distance / radius;
        return {
          hitch: {
            x: state.turnStartX + radius * Math.sin(angle),
            z: -radius * Math.cos(angle)
          },
          cabHeading: angle
        };
      }
      return {
        hitch: {
          x: state.turnStartX + radius,
          z: distance - arcLength
        },
        cabHeading: Math.PI / 2
      };
    }

    let kinematicCache = null;

    function kinematicCacheKey() {
      return [
        state.turnRadius,
        state.turnStartX,
        state.stopY,
        state.trailerLength,
        state.trailerFrontOverhang,
        state.trailerRearOverhang,
        state.maxArticulation,
        state.sweepSamples
      ].join("|");
    }

    function kinematicSamples() {
      const key = kinematicCacheKey();
      if (kinematicCache?.key === key) return kinematicCache.samples;

      const totalLength = Math.max(0.001, pathLength());
      const steps = Math.max(180, Math.round(state.sweepSamples) * 4);
      const samples = [];
      let trailerHeading = 0;
      const effectiveTrailerWheelbase = Math.max(0.4, trailerWheelbase());
      const maxDelta = THREE.MathUtils.degToRad(state.maxArticulation);

      for (let i = 0; i <= steps; i++) {
        const progress = i / steps;
        const distance = progress * totalLength;
        const point = pathPointAtDistance(distance);

        if (i > 0) {
          const previousDistance = (i - 1) / steps * totalLength;
          const ds = distance - previousDistance;
          const midpoint = pathPointAtDistance((previousDistance + distance) / 2);
          trailerHeading += ds / effectiveTrailerWheelbase * Math.sin(midpoint.cabHeading - trailerHeading);

          const delta = point.cabHeading - trailerHeading;
          if (Math.abs(delta) > maxDelta) {
            trailerHeading = point.cabHeading - Math.sign(delta) * maxDelta;
          }
        }

        samples.push({
          progress,
          hitch: point.hitch,
          cabHeading: point.cabHeading,
          trailerHeading
        });
      }

      kinematicCache = { key, samples };
      return samples;
    }

    function poseAt(progress01) {
      const progress = THREE.MathUtils.clamp(progress01, 0, 1);
      const samples = kinematicSamples();
      const scaled = progress * (samples.length - 1);
      const low = Math.floor(scaled);
      const high = Math.min(samples.length - 1, low + 1);
      const t = scaled - low;
      const a = samples[low];
      const b = samples[high];
      const hitch = {
        x: THREE.MathUtils.lerp(a.hitch.x, b.hitch.x, t),
        z: THREE.MathUtils.lerp(a.hitch.z, b.hitch.z, t)
      };
      const cabHeading = THREE.MathUtils.lerp(a.cabHeading, b.cabHeading, t);
      const trailerHeading = THREE.MathUtils.lerp(a.trailerHeading, b.trailerHeading, t);

      const cabCenter = centerFromHitch(hitch, cabHeading, state.hitchGap + cabLength() / 2);
      const trailerCenter = centerFromHitch(
        hitch,
        trailerHeading,
        (state.trailerFrontOverhang - (trailerWheelbase() + state.trailerRearOverhang)) / 2
      );

      return { hitch, cabHeading, trailerHeading, cabCenter, trailerCenter };
    }

    function wheelBoxes(pose) {
      const boxes = [];
      const wheelY0 = 0;
      const wheelY1 = state.wheelRadius * 2;
      const wheelLength = state.wheelRadius * 2;
      const pairs = [
        { base: pose.cabCenter, width: outerWidth(state.cabWidth), offsets: axleOffsets(cabLength(), cabWheelbase()) },
        { base: pose.trailerCenter, width: outerWidth(state.trailerWidth), offsets: axleOffsets(trailerLength(), trailerWheelbase()) }
      ];

      for (const pair of pairs) {
        const c = Math.cos(pair.base.heading);
        const s = Math.sin(pair.base.heading);
        const track = Math.min(Math.max(state.wheelTrack, state.wheelWidth), pair.width + state.wheelWidth * 2);
        for (const longOffset of pair.offsets) {
          for (const side of [-1, 1]) {
            const lat = side * track / 2;
            boxes.push({
              cx: pair.base.cx + c * longOffset - s * lat,
              cz: pair.base.cz + s * longOffset + c * lat,
              heading: pair.base.heading,
              length: wheelLength,
              width: state.wheelWidth,
              y0: wheelY0,
              y1: wheelY1
            });
          }
        }
      }
      return boxes;
    }

    function bodyBoxes(progress01) {
      const pose = poseAt(progress01);
      const boxes = [
        {
          cx: pose.cabCenter.cx,
          cz: pose.cabCenter.cz,
          heading: pose.cabCenter.heading,
          length: cabLength(),
          width: outerWidth(state.cabWidth),
          y0: state.chassisHeight,
          y1: state.chassisHeight + state.cabHeight
        },
        {
          cx: pose.trailerCenter.cx,
          cz: pose.trailerCenter.cz,
          heading: pose.trailerCenter.heading,
          length: trailerLength(),
          width: outerWidth(state.trailerWidth),
          y0: state.chassisHeight,
          y1: state.chassisHeight + state.deckHeight
        }
      ];

      if (state.cargoEnabled) {
        const currentCargoPose = cargoPose(pose);
        const currentCargoLength = Math.min(state.cargoLength, trailerLength());
        boxes.push({
          cx: currentCargoPose.cx,
          cz: currentCargoPose.cz,
          heading: currentCargoPose.heading,
          length: currentCargoLength,
          width: outerWidth(state.trailerWidth),
          y0: state.chassisHeight + state.deckHeight + state.cargoBaseOffset,
          y1: state.chassisHeight + state.deckHeight + state.cargoBaseOffset + state.cargoHeight
        });
      }
      boxes.push(...wheelBoxes(pose));
      return boxes;
    }

    function pointInBox(x, y, z, box) {
      if (y < box.y0 || y > box.y1) return false;
      const dx = x - box.cx;
      const dz = z - box.cz;
      const c = Math.cos(box.heading);
      const s = Math.sin(box.heading);
      const localLong = dx * c + dz * s;
      const localLat = -dx * s + dz * c;
      return Math.abs(localLong) <= box.length / 2 && Math.abs(localLat) <= box.width / 2;
    }

    function pointInAnySweptBox(x, y, z, frames) {
      for (const frame of frames) {
        for (const box of frame) {
          if (pointInBox(x, y, z, box)) return true;
        }
      }
      return false;
    }

    function buildRoad() {
      clearGroup(groups.road);
      const roadThickness = 0.05;
      const long = 34;
      const xMin = 3 - long / 2;
      const xMax = 3 + long / 2;
      const zMin = 3 - long / 2;
      const zMax = 3 + long / 2;
      const inWidth = state.roadWidthIn;
      const outWidth = state.roadWidthOut;
      const roadShape = new THREE.Shape();
      const roadPoints = [
        [xMin, -inWidth],
        [0, -inWidth],
        [0, zMin],
        [outWidth, zMin],
        [outWidth, -inWidth],
        [xMax, -inWidth],
        [xMax, 0],
        [outWidth, 0],
        [outWidth, zMax],
        [0, zMax],
        [0, 0],
        [xMin, 0]
      ];
      roadShape.moveTo(roadPoints[0][0], -roadPoints[0][1]);
      for (const [x, z] of roadPoints.slice(1)) roadShape.lineTo(x, -z);
      roadShape.closePath();
      const roadGeometry = new THREE.ExtrudeGeometry(roadShape, {
        depth: roadThickness,
        bevelEnabled: false
      });
      roadGeometry.rotateX(-Math.PI / 2);
      roadGeometry.translate(0, -roadThickness, 0);
      const road = new THREE.Mesh(roadGeometry, materials.road);
      road.renderOrder = -2;
      groups.road.add(road);

      const edgeGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0.012, -state.roadWidthIn),
        new THREE.Vector3(0, 0.012, 0),
        new THREE.Vector3(state.roadWidthOut, 0.012, 0)
      ]);
      groups.road.add(new THREE.Line(edgeGeom, new THREE.LineBasicMaterial({ color: 0x9aa6b2, transparent: true, opacity: 0.58 })));

      const axes = new THREE.GridHelper(36, 36, 0xc8d0d8, 0xdde4ea);
      axes.position.set(6, 0.004, 2);
      groups.road.add(axes);
    }

    function prismGeometry(xLength, yLength, height) {
      const vertices = new Float32Array([
        0, 0, 0,  -xLength, 0, 0,  0, 0, yLength,
        0, height, 0,  -xLength, height, 0,  0, height, yLength
      ]);
      const indices = [
        0, 2, 1,
        3, 4, 5,
        0, 1, 4, 0, 4, 3,
        1, 2, 5, 1, 5, 4,
        2, 0, 3, 2, 3, 5
      ];
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(vertices, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      return geometry;
    }

    function buildPrism() {
      clearGroup(groups.prism);
      const geom = prismGeometry(state.chamferX, state.chamferY, state.prismHeight);
      const mesh = new THREE.Mesh(geom, materials.prism);
      mesh.renderOrder = 10;
      groups.prism.add(mesh);

      const edges = new THREE.EdgesGeometry(geom);
      const line = new THREE.LineSegments(edges, materials.prismWire);
      line.renderOrder = 40;
      groups.prism.add(line);
    }

    function axleOffsets(bodyLength, wheelbase) {
      const maxWheelbase = Math.max(0.8, bodyLength - state.wheelRadius * 2.4);
      const spacing = Math.min(Math.max(0.4, wheelbase), maxWheelbase);
      return [-spacing / 2, spacing / 2];
    }

    function addWheels(group, pose) {
      const wheelPairs = [
        { base: pose.cabCenter, width: outerWidth(state.cabWidth), offsets: axleOffsets(cabLength(), cabWheelbase()) },
        { base: pose.trailerCenter, width: outerWidth(state.trailerWidth), offsets: axleOffsets(trailerLength(), trailerWheelbase()) }
      ];

      for (const pair of wheelPairs) {
        for (const longOffset of pair.offsets) {
          for (const side of [-1, 1]) {
            const c = Math.cos(pair.base.heading);
            const s = Math.sin(pair.base.heading);
            const track = Math.min(Math.max(state.wheelTrack, state.wheelWidth), pair.width + state.wheelWidth * 2);
            const lat = side * track / 2;
            const x = pair.base.cx + c * longOffset - s * lat;
            const z = pair.base.cz + s * longOffset + c * lat;
            const wheel = new THREE.Mesh(
              new THREE.CylinderGeometry(state.wheelRadius, state.wheelRadius, state.wheelWidth, 20),
              materials.tire
            );
            wheel.position.set(x, state.wheelRadius, z);
            const axleDirection = new THREE.Vector3(-s, 0, c).normalize();
            wheel.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), axleDirection);
            group.add(wheel);
          }
        }
      }
    }

    function buildTruck() {
      clearGroup(groups.truck);
      const pose = poseAt(state.progress / 100);
      groups.truck.add(makeBox(cabLength(), state.cabHeight, outerWidth(state.cabWidth), pose.cabCenter, state.chassisHeight, materials.cab));
      groups.truck.add(makeBox(trailerLength(), state.deckHeight, outerWidth(state.trailerWidth), pose.trailerCenter, state.chassisHeight, materials.trailer));
      if (state.cargoEnabled) {
        const currentCargoPose = cargoPose(pose);
        groups.truck.add(makeBox(
          Math.min(state.cargoLength, trailerLength()),
          state.cargoHeight,
          outerWidth(state.trailerWidth),
          currentCargoPose,
          state.chassisHeight + state.deckHeight + state.cargoBaseOffset,
          materials.cargo
        ));
      }
      addWheels(groups.truck, pose);
    }

    function buildSweptGhosts() {
      clearGroup(groups.swept);
      if (!state.showSwept) return;
      const ghostCount = 15;
      const currentProgress = state.progress / 100;
      const currentFrameTolerance = 0.55 / (ghostCount - 1);
      for (let i = 0; i < ghostCount; i++) {
        const progress = i / (ghostCount - 1);
        if (Math.abs(progress - currentProgress) < currentFrameTolerance) continue;
        const pose = poseAt(progress);
        const cab = makeSweptBox(cabLength(), state.cabHeight, outerWidth(state.cabWidth), pose.cabCenter, state.chassisHeight);
        const deck = makeSweptBox(trailerLength(), state.deckHeight, outerWidth(state.trailerWidth), pose.trailerCenter, state.chassisHeight);
        groups.swept.add(cab, deck);
        if (state.cargoEnabled) {
          const currentCargoPose = cargoPose(pose);
          groups.swept.add(makeSweptBox(
            Math.min(state.cargoLength, trailerLength()),
            state.cargoHeight,
            outerWidth(state.trailerWidth),
            currentCargoPose,
            state.chassisHeight + state.deckHeight + state.cargoBaseOffset
          ));
        }
      }
    }

    function buildVoxels() {
      clearGroup(groups.voxels);
      const result = computeVoxelResult();
      latestVoxelResult = result;
      latestSmoothResult = null;
      setMetrics(result.totalVolume, result.cutVolume, result.remainVolume);

      if (state.showRemaining && result.remaining.length) {
        const mesh = state.smoothVolume
          ? smoothedVoxelSurfaceMesh(result.remaining, result.dx, result.dy, result.dPlaneY, materials.remaining)
          : voxelSurfaceMesh(result.remaining, result.dx, result.dy, result.dPlaneY, materials.remaining);
        mesh.renderOrder = 30;
        groups.voxels.add(mesh);
      }
      if (state.showIntersection && result.occupied.length) {
        const mesh = state.smoothVolume
          ? smoothedVoxelSurfaceMesh(result.occupied, result.dx, result.dy, result.dPlaneY, materials.cut)
          : voxelSurfaceMesh(result.occupied, result.dx, result.dy, result.dPlaneY, materials.cut);
        mesh.renderOrder = 31;
        groups.voxels.add(mesh);
      }

      const currentStatus = document.querySelector("#status");
      currentStatus.textContent = state.smoothVolume
        ? tr("statusSmooth")
        : tr("statusVoxel");
      refreshRemainingViewer();
      return;
      const frames = [];
      const sampleFrames = Math.max(2, Math.round(state.sweepSamples));
      for (let i = 0; i < sampleFrames; i++) {
        frames.push(bodyBoxes(i / (sampleFrames - 1)));
      }

      const res = Math.max(4, Math.round(state.gridResolution));
      const slices = Math.max(2, Math.round(state.heightSlices));
      const dx = state.chamferX / res;
      const dPlaneY = state.chamferY / res;
      const dy = state.prismHeight / slices;
      const cellVolume = dx * dPlaneY * dy;
      const occupied = [];
      const remaining = [];
      let totalCells = 0;

      for (let ix = 0; ix < res; ix++) {
        const x = -(ix + 0.5) * dx;
        for (let iz = 0; iz < res; iz++) {
          const planeY = -(iz + 0.5) * dPlaneY;
          const z = -planeY;
          if (Math.abs(x) / state.chamferX + Math.abs(planeY) / state.chamferY > 1) continue;
          for (let iy = 0; iy < slices; iy++) {
            const y = (iy + 0.5) * dy;
            totalCells++;
            const record = { x, y, z, ix, iy, iz };
            if (pointInAnySweptBox(x, y, z, frames)) occupied.push(record);
            else remaining.push(record);
          }
        }
      }

      const totalVolume = 0.5 * state.chamferX * state.chamferY * state.prismHeight;
      const cutVolume = occupied.length * cellVolume;
      const remainVolume = Math.max(0, totalVolume - cutVolume);
      setMetrics(totalVolume, cutVolume, remainVolume);

      const cube = new THREE.BoxGeometry(dx * 0.82, dy * 0.82, dPlaneY * 0.82);
      if (state.showRemaining && remaining.length) {
        const mesh = new THREE.InstancedMesh(cube, materials.remaining, remaining.length);
        mesh.frustumCulled = false;
        placeInstances(mesh, remaining);
        mesh.renderOrder = 30;
        groups.voxels.add(mesh);
      }
      if (state.showIntersection && occupied.length) {
        const mesh = new THREE.InstancedMesh(cube, materials.cut, occupied.length);
        mesh.frustumCulled = false;
        placeInstances(mesh, occupied);
        mesh.renderOrder = 31;
        groups.voxels.add(mesh);
      }

      const status = document.querySelector("#status");
      status.textContent = state.smoothVolume ? tr("statusSmooth") : tr("statusVoxel");
    }

    function placeInstances(mesh, cells) {
      const matrix = new THREE.Matrix4();
      for (let i = 0; i < cells.length; i++) {
        matrix.makeTranslation(cells[i].x, cells[i].y, cells[i].z);
        mesh.setMatrixAt(i, matrix);
      }
      mesh.instanceMatrix.needsUpdate = true;
    }

    function computeVoxelResult() {
      const frames = [];
      const sampleFrames = Math.max(2, Math.round(state.sweepSamples));
      for (let i = 0; i < sampleFrames; i++) {
        frames.push(bodyBoxes(i / (sampleFrames - 1)));
      }

      const res = Math.max(4, Math.round(state.gridResolution));
      const slices = Math.max(2, Math.round(state.heightSlices));
      const dx = state.chamferX / res;
      const dPlaneY = state.chamferY / res;
      const dy = state.prismHeight / slices;
      const cellVolume = dx * dPlaneY * dy;
      const occupied = [];
      const remaining = [];
      let totalCells = 0;

      for (let ix = 0; ix < res; ix++) {
        const x = -(ix + 0.5) * dx;
        for (let iz = 0; iz < res; iz++) {
          const planeY = -(iz + 0.5) * dPlaneY;
          const z = -planeY;
          if (Math.abs(x) / state.chamferX + Math.abs(planeY) / state.chamferY > 1) continue;
          for (let iy = 0; iy < slices; iy++) {
            const y = (iy + 0.5) * dy;
            totalCells++;
            const record = { x, y, z, ix, iy, iz };
            if (pointInAnySweptBox(x, y, z, frames)) occupied.push(record);
            else remaining.push(record);
          }
        }
      }

      const totalVolume = 0.5 * state.chamferX * state.chamferY * state.prismHeight;
      const cutVolume = occupied.length * cellVolume;
      const remainVolume = Math.max(0, totalVolume - cutVolume);
      return { remaining, occupied, totalCells, sampleFrames, dx, dPlaneY, dy, totalVolume, cutVolume, remainVolume };
    }

    function closeRing(points) {
      if (!points.length) return points;
      const first = points[0];
      const last = points[points.length - 1];
      if (Math.abs(first[0] - last[0]) < 1e-8 && Math.abs(first[1] - last[1]) < 1e-8) return points;
      return [...points, [first[0], first[1]]];
    }

    function stableCoord(value) {
      return Math.round(value * 1000) / 1000;
    }

    function stablePoint(point) {
      return [stableCoord(point[0]), stableCoord(point[1])];
    }

    function sanitizeRing(ring) {
      const open = ring.slice(0, -1).map(stablePoint);
      const clean = [];
      for (const point of open) {
        const previous = clean[clean.length - 1];
        if (!previous || Math.hypot(point[0] - previous[0], point[1] - previous[1]) > 1e-6) clean.push(point);
      }
      if (clean.length > 2) {
        const first = clean[0];
        const last = clean[clean.length - 1];
        if (Math.hypot(first[0] - last[0], first[1] - last[1]) < 1e-6) clean.pop();
      }
      return clean.length >= 3 ? closeRing(clean) : [];
    }

    function sanitizeMultiPolygon(multiPolygon) {
      const result = [];
      for (const polygon of multiPolygon || []) {
        const rings = polygon.map(sanitizeRing).filter(ring => ring.length >= 4);
        if (rings.length) result.push(rings);
      }
      return result;
    }

    function chamferMultiPolygon() {
      return [[closeRing([
        [0, 0],
        [0, state.chamferY],
        [-state.chamferX, 0]
      ])]];
    }

    function boxPolygon(box) {
      const c = Math.cos(box.heading);
      const s = Math.sin(box.heading);
      const halfLong = box.length / 2;
      const halfLat = box.width / 2;
      const corners = [
        [-halfLong, -halfLat],
        [halfLong, -halfLat],
        [halfLong, halfLat],
        [-halfLong, halfLat]
      ].map(([long, lat]) => [
        box.cx + c * long - s * lat,
        box.cz + s * long + c * lat
      ]);
      return [sanitizeRing(corners)];
    }

    function unionMany(polygons) {
      if (!polygons.length) return [];
      const unique = [];
      const seen = new Set();
      for (const polygon of polygons) {
        const sanitized = sanitizeMultiPolygon([polygon]);
        if (!sanitized.length) continue;
        const key = JSON.stringify(sanitized);
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(sanitized);
      }
      if (!unique.length) return [];

      const chunkSize = 10;
      let result = unique[0];
      for (let i = 1; i < unique.length; i += chunkSize) {
        result = sanitizeMultiPolygon(polygonClipping.union(result, ...unique.slice(i, i + chunkSize)));
      }
      return result || [];
    }

    function convexHull(points) {
      const unique = [];
      const seen = new Set();
      for (const point of points.map(stablePoint)) {
        const key = `${point[0]},${point[1]}`;
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(point);
      }
      unique.sort((a, b) => a[0] === b[0] ? a[1] - b[1] : a[0] - b[0]);
      if (unique.length < 3) return [];
      const cross = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
      const lower = [];
      for (const point of unique) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) lower.pop();
        lower.push(point);
      }
      const upper = [];
      for (let i = unique.length - 1; i >= 0; i--) {
        const point = unique[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) upper.pop();
        upper.push(point);
      }
      return lower.slice(0, -1).concat(upper.slice(0, -1));
    }

    function envelopeMultiPolygon(polygons) {
      const points = [];
      for (const polygon of polygons) {
        for (const ring of polygon) {
          for (let i = 0; i < ring.length - 1; i++) points.push(ring[i]);
        }
      }
      const hull = convexHull(points);
      return hull.length >= 3 ? [[closeRing(hull)]] : [];
    }

    function computeLayerBoolean(chamfer, activePolygons) {
      if (!activePolygons.length) {
        return { occupied: [], remaining: chamfer, method: "empty" };
      }

      let swept;
      let method = "boolean";
      try {
        swept = unionMany(activePolygons);
      } catch (error) {
        swept = envelopeMultiPolygon(activePolygons);
        method = "envelope";
      }

      if (!swept.length) return { occupied: [], remaining: chamfer, method };

      try {
        const occupied = sanitizeMultiPolygon(polygonClipping.intersection(chamfer, swept));
        const remaining = occupied.length
          ? sanitizeMultiPolygon(polygonClipping.difference(chamfer, occupied))
          : chamfer;
        return { occupied, remaining, method };
      } catch (error) {
        const envelope = envelopeMultiPolygon(activePolygons);
        if (!envelope.length) return { occupied: [], remaining: chamfer, method: "empty" };
        try {
          const occupied = sanitizeMultiPolygon(polygonClipping.intersection(chamfer, envelope));
          const remaining = occupied.length
            ? sanitizeMultiPolygon(polygonClipping.difference(chamfer, occupied))
            : chamfer;
          return { occupied, remaining, method: "envelope" };
        } catch (fallbackError) {
          return { occupied: [], remaining: chamfer, method: "empty" };
        }
      }
    }

    function multiPolygonArea(multiPolygon) {
      let area = 0;
      for (const polygon of multiPolygon || []) {
        for (let ringIndex = 0; ringIndex < polygon.length; ringIndex++) {
          const ring = polygon[ringIndex];
          let ringArea = 0;
          for (let i = 0; i < ring.length - 1; i++) {
            ringArea += ring[i][0] * ring[i + 1][1] - ring[i + 1][0] * ring[i][1];
          }
          area += (ringIndex === 0 ? 1 : -1) * Math.abs(ringArea) / 2;
        }
      }
      return Math.max(0, area);
    }

    function uniqueSorted(values) {
      const sorted = [...values]
        .filter(value => Number.isFinite(value))
        .sort((a, b) => a - b);
      const result = [];
      for (const value of sorted) {
        if (!result.length || Math.abs(value - result[result.length - 1]) > 1e-6) result.push(value);
      }
      return result;
    }

    function computeSmoothVolumeResult() {
      const requestedFrames = Math.max(2, Math.round(state.sweepSamples));
      const sampleFrames = Math.min(28, requestedFrames);
      const frames = [];
      const yBreaks = new Set([0, state.prismHeight]);
      for (let i = 0; i < sampleFrames; i++) {
        const boxes = bodyBoxes(i / (sampleFrames - 1));
        frames.push(boxes);
        for (const box of boxes) {
          const y0 = Math.max(0, Math.min(state.prismHeight, box.y0));
          const y1 = Math.max(0, Math.min(state.prismHeight, box.y1));
          if (y1 > y0) {
            yBreaks.add(y0);
            yBreaks.add(y1);
          }
        }
      }

      const chamfer = chamferMultiPolygon();
      const remainingSolids = [];
      const occupiedSolids = [];
      let cutVolume = 0;
      let envelopeFallbacks = 0;
      const breaks = uniqueSorted([...yBreaks]);

      for (let i = 0; i < breaks.length - 1; i++) {
        const y0 = breaks[i];
        const y1 = breaks[i + 1];
        if (y1 - y0 < 1e-6) continue;
        const activePolygons = [];
        for (const frame of frames) {
          for (const box of frame) {
            if (box.y0 < y1 && box.y1 > y0) activePolygons.push(boxPolygon(box));
          }
        }

        const layer = computeLayerBoolean(chamfer, activePolygons);
        const occupied = layer.occupied;
        const remaining = layer.remaining;
        if (layer.method === "envelope") envelopeFallbacks++;

        if (occupied.length) {
          occupiedSolids.push({ multiPolygon: occupied, y0, y1 });
          cutVolume += multiPolygonArea(occupied) * (y1 - y0);
        }
        if (remaining.length) remainingSolids.push({ multiPolygon: remaining, y0, y1 });
      }

      const totalVolume = 0.5 * state.chamferX * state.chamferY * state.prismHeight;
      const remainVolume = Math.max(0, totalVolume - cutVolume);
      return {
        mode: "smooth",
        remainingSolids,
        occupiedSolids,
        totalVolume,
        cutVolume,
        remainVolume,
        sampleFrames,
        requestedFrames,
        envelopeFallbacks,
        slabCount: Math.max(0, breaks.length - 1)
      };
    }

    function cleanRing(ring) {
      if (!ring || ring.length < 4) return [];
      const openRing = ring.slice(0, -1);
      const result = [];
      for (const point of openRing) {
        const previous = result[result.length - 1];
        if (!previous || Math.hypot(point[0] - previous[0], point[1] - previous[1]) > 1e-7) {
          result.push(point);
        }
      }
      if (result.length > 1) {
        const first = result[0];
        const last = result[result.length - 1];
        if (Math.hypot(first[0] - last[0], first[1] - last[1]) < 1e-7) result.pop();
      }
      return result;
    }

    function addVertex(positions, x, y, z) {
      positions.push(x, y, z);
    }

    function addExtrudedRingSides(positions, ring, y0, y1) {
      for (let i = 0; i < ring.length; i++) {
        const a = ring[i];
        const b = ring[(i + 1) % ring.length];
        addVertex(positions, a[0], y0, a[1]);
        addVertex(positions, b[0], y0, b[1]);
        addVertex(positions, b[0], y1, b[1]);
        addVertex(positions, a[0], y0, a[1]);
        addVertex(positions, b[0], y1, b[1]);
        addVertex(positions, a[0], y1, a[1]);
      }
    }

    function extrudedSolidsGeometry(solids) {
      const positions = [];
      for (const solid of solids) {
        for (const polygon of solid.multiPolygon || []) {
          const contourRing = cleanRing(polygon[0]);
          if (contourRing.length < 3) continue;
          const holeRings = polygon.slice(1).map(cleanRing).filter(ring => ring.length >= 3);
          const contour = contourRing.map(([x, z]) => new THREE.Vector2(x, z));
          const holes = holeRings.map(ring => ring.map(([x, z]) => new THREE.Vector2(x, z)));
          const flatPoints = [...contour, ...holes.flat()];
          const faces = THREE.ShapeUtils.triangulateShape(contour, holes);

          for (const face of faces) {
            const a = flatPoints[face[0]];
            const b = flatPoints[face[1]];
            const c = flatPoints[face[2]];
            addVertex(positions, a.x, solid.y1, a.y);
            addVertex(positions, b.x, solid.y1, b.y);
            addVertex(positions, c.x, solid.y1, c.y);
            addVertex(positions, c.x, solid.y0, c.y);
            addVertex(positions, b.x, solid.y0, b.y);
            addVertex(positions, a.x, solid.y0, a.y);
          }

          addExtrudedRingSides(positions, contourRing, solid.y0, solid.y1);
          for (const holeRing of holeRings) addExtrudedRingSides(positions, holeRing, solid.y1, solid.y0);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.computeVertexNormals();
      geometry.computeBoundingSphere();
      return geometry;
    }

    function extrudedSolidsMesh(solids, material) {
      const mesh = new THREE.Mesh(extrudedSolidsGeometry(solids), material);
      mesh.frustumCulled = false;
      return mesh;
    }

    function cubeVertices(cell, dx, dy, dz) {
      const hx = dx / 2;
      const hy = dy / 2;
      const hz = dz / 2;
      return [
        [cell.x - hx, cell.y - hy, cell.z - hz],
        [cell.x + hx, cell.y - hy, cell.z - hz],
        [cell.x + hx, cell.y + hy, cell.z - hz],
        [cell.x - hx, cell.y + hy, cell.z - hz],
        [cell.x - hx, cell.y - hy, cell.z + hz],
        [cell.x + hx, cell.y - hy, cell.z + hz],
        [cell.x + hx, cell.y + hy, cell.z + hz],
        [cell.x - hx, cell.y + hy, cell.z + hz]
      ];
    }

    function voxelSurfaceTriangles(cells, dx, dy, dz) {
      const cellSet = new Set(cells.map(cell => `${cell.ix},${cell.iy},${cell.iz}`));
      const faceMaps = {
        px: new Map(),
        nx: new Map(),
        py: new Map(),
        ny: new Map(),
        pz: new Map(),
        nz: new Map()
      };
      const triangles = [];

      const addFace = (map, plane, u, v) => {
        if (!map.has(plane)) map.set(plane, new Set());
        map.get(plane).add(`${u},${v}`);
      };

      for (const cell of cells) {
        if (!cellSet.has(`${cell.ix - 1},${cell.iy},${cell.iz}`)) addFace(faceMaps.px, cell.ix, cell.iy, cell.iz);
        if (!cellSet.has(`${cell.ix + 1},${cell.iy},${cell.iz}`)) addFace(faceMaps.nx, cell.ix + 1, cell.iy, cell.iz);
        if (!cellSet.has(`${cell.ix},${cell.iy + 1},${cell.iz}`)) addFace(faceMaps.py, cell.iy + 1, cell.ix, cell.iz);
        if (!cellSet.has(`${cell.ix},${cell.iy - 1},${cell.iz}`)) addFace(faceMaps.ny, cell.iy, cell.ix, cell.iz);
        if (!cellSet.has(`${cell.ix},${cell.iy},${cell.iz + 1}`)) addFace(faceMaps.pz, cell.iz + 1, cell.ix, cell.iy);
        if (!cellSet.has(`${cell.ix},${cell.iy},${cell.iz - 1}`)) addFace(faceMaps.nz, cell.iz, cell.ix, cell.iy);
      }

      const pushQuad = (normal, vertices) => {
        triangles.push({ normal, vertices: [vertices[0], vertices[1], vertices[2]] });
        triangles.push({ normal, vertices: [vertices[0], vertices[2], vertices[3]] });
      };

      const mergePlaneFaces = (map, emitRect) => {
        for (const [plane, faceSet] of map.entries()) {
          const remaining = new Set(faceSet);
          while (remaining.size) {
            const first = remaining.values().next().value;
            const [u0, v0] = first.split(",").map(Number);
            let width = 1;
            while (remaining.has(`${u0 + width},${v0}`)) width++;

            let height = 1;
            let canGrow = true;
            while (canGrow) {
              for (let u = u0; u < u0 + width; u++) {
                if (!remaining.has(`${u},${v0 + height}`)) {
                  canGrow = false;
                  break;
                }
              }
              if (canGrow) height++;
            }

            for (let u = u0; u < u0 + width; u++) {
              for (let v = v0; v < v0 + height; v++) {
                remaining.delete(`${u},${v}`);
              }
            }
            emitRect(plane, u0, v0, width, height);
          }
        }
      };

      mergePlaneFaces(faceMaps.px, (plane, u, v, width, height) => {
        const x = -plane * dx;
        const y0 = u * dy;
        const y1 = (u + width) * dy;
        const z0 = v * dz;
        const z1 = (v + height) * dz;
        pushQuad([1, 0, 0], [[x, y0, z0], [x, y1, z0], [x, y1, z1], [x, y0, z1]]);
      });
      mergePlaneFaces(faceMaps.nx, (plane, u, v, width, height) => {
        const x = -plane * dx;
        const y0 = u * dy;
        const y1 = (u + width) * dy;
        const z0 = v * dz;
        const z1 = (v + height) * dz;
        pushQuad([-1, 0, 0], [[x, y0, z0], [x, y0, z1], [x, y1, z1], [x, y1, z0]]);
      });
      mergePlaneFaces(faceMaps.py, (plane, u, v, width, height) => {
        const y = plane * dy;
        const x0 = -(u + width) * dx;
        const x1 = -u * dx;
        const z0 = v * dz;
        const z1 = (v + height) * dz;
        pushQuad([0, 1, 0], [[x0, y, z0], [x0, y, z1], [x1, y, z1], [x1, y, z0]]);
      });
      mergePlaneFaces(faceMaps.ny, (plane, u, v, width, height) => {
        const y = plane * dy;
        const x0 = -(u + width) * dx;
        const x1 = -u * dx;
        const z0 = v * dz;
        const z1 = (v + height) * dz;
        pushQuad([0, -1, 0], [[x0, y, z0], [x1, y, z0], [x1, y, z1], [x0, y, z1]]);
      });
      mergePlaneFaces(faceMaps.pz, (plane, u, v, width, height) => {
        const z = plane * dz;
        const x0 = -(u + width) * dx;
        const x1 = -u * dx;
        const y0 = v * dy;
        const y1 = (v + height) * dy;
        pushQuad([0, 0, 1], [[x0, y0, z], [x1, y0, z], [x1, y1, z], [x0, y1, z]]);
      });
      mergePlaneFaces(faceMaps.nz, (plane, u, v, width, height) => {
        const z = plane * dz;
        const x0 = -(u + width) * dx;
        const x1 = -u * dx;
        const y0 = v * dy;
        const y1 = (v + height) * dy;
        pushQuad([0, 0, -1], [[x0, y0, z], [x0, y1, z], [x1, y1, z], [x1, y0, z]]);
      });

      return triangles;
    }

    function voxelSurfaceMesh(cells, dx, dy, dz, material) {
      const triangles = voxelSurfaceTriangles(cells, dx, dy, dz);
      const positions = [];
      const normals = [];
      for (const triangle of triangles) {
        for (const vertex of triangle.vertices) {
          positions.push(vertex[0], vertex[1], vertex[2]);
          normals.push(triangle.normal[0], triangle.normal[1], triangle.normal[2]);
        }
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("normal", new THREE.Float32BufferAttribute(normals, 3));
      geometry.computeBoundingSphere();
      const mesh = new THREE.Mesh(geometry, material);
      mesh.frustumCulled = false;
      return mesh;
    }

    function smoothedVoxelSurfaceGeometry(cells, dx, dy, dz, bounds = state) {
      const triangles = voxelSurfaceTriangles(cells, dx, dy, dz);
      const vertices = [];
      const indices = [];
      const vertexMap = new Map();
      const keyOf = vertex => vertex.map(value => Math.round(value * 10000) / 10000).join(",");

      const getIndex = vertex => {
        const key = keyOf(vertex);
        if (vertexMap.has(key)) return vertexMap.get(key);
        const index = vertices.length;
        vertices.push(new THREE.Vector3(vertex[0], vertex[1], vertex[2]));
        vertexMap.set(key, index);
        return index;
      };

      for (const triangle of triangles) {
        indices.push(...triangle.vertices.map(getIndex));
      }

      const adjacency = vertices.map(() => new Set());
      for (let i = 0; i < indices.length; i += 3) {
        const a = indices[i];
        const b = indices[i + 1];
        const c = indices[i + 2];
        adjacency[a].add(b); adjacency[a].add(c);
        adjacency[b].add(a); adjacency[b].add(c);
        adjacency[c].add(a); adjacency[c].add(b);
      }

      const isLocked = vertex => {
        const onGroundOrTop = vertex.y < 1e-5 || Math.abs(vertex.y - bounds.prismHeight) < 1e-5;
        const onXEdge = Math.abs(vertex.x) < 1e-5 || Math.abs(vertex.x + bounds.chamferX) < 1e-5;
        const onZEdge = Math.abs(vertex.z) < 1e-5 || Math.abs(vertex.z - bounds.chamferY) < 1e-5;
        const onChamferFace = Math.abs((-vertex.x / bounds.chamferX) + (vertex.z / bounds.chamferY) - 1) < Math.max(dx, dz) * 0.55;
        return onGroundOrTop || onXEdge || onZEdge || onChamferFace;
      };

      let smoothed = vertices.map(vertex => vertex.clone());
      for (let pass = 0; pass < 3; pass++) {
        const next = smoothed.map(vertex => vertex.clone());
        for (let i = 0; i < smoothed.length; i++) {
          if (isLocked(vertices[i]) || adjacency[i].size < 3) continue;
          const average = new THREE.Vector3();
          for (const neighbor of adjacency[i]) average.add(smoothed[neighbor]);
          average.multiplyScalar(1 / adjacency[i].size);
          next[i].lerp(average, 0.34);
        }
        smoothed = next;
      }

      const positions = [];
      for (const index of indices) {
        const vertex = smoothed[index];
        positions.push(vertex.x, vertex.y, vertex.z);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.computeVertexNormals();
      geometry.computeBoundingSphere();
      return geometry;
    }

    function smoothedVoxelSurfaceMesh(cells, dx, dy, dz, material, bounds = state) {
      const mesh = new THREE.Mesh(smoothedVoxelSurfaceGeometry(cells, dx, dy, dz, bounds), material);
      mesh.frustumCulled = false;
      return mesh;
    }

    function downloadText(filename, text, type = "text/plain;charset=utf-8") {
      const blob = new Blob([text], { type });
      downloadBlob(filename, blob);
    }

    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function geometryToTriangles(geometry) {
      const position = geometry.getAttribute("position");
      const triangles = [];
      for (let i = 0; i < position.count; i += 3) {
        const vertices = [
          [position.getX(i), position.getY(i), position.getZ(i)],
          [position.getX(i + 1), position.getY(i + 1), position.getZ(i + 1)],
          [position.getX(i + 2), position.getY(i + 2), position.getZ(i + 2)]
        ];
        triangles.push({ vertices });
      }
      return triangles;
    }

    function exportTrianglesAsStl(triangles, filename, headerText) {
      const buffer = new ArrayBuffer(84 + triangles.length * 50);
      const view = new DataView(buffer);
      for (let i = 0; i < Math.min(80, headerText.length); i++) {
        view.setUint8(i, headerText.charCodeAt(i));
      }
      view.setUint32(80, triangles.length, true);
      let offset = 84;

      for (const triangle of triangles) {
        const vertices = triangle.vertices.map(toSketchupStlAxes);
        const normal = triangleNormal(vertices[0], vertices[1], vertices[2]);
        for (const value of normal) {
          view.setFloat32(offset, value, true);
          offset += 4;
        }
        for (const vertex of vertices) {
          for (const value of vertex) {
            view.setFloat32(offset, value, true);
            offset += 4;
          }
        }
        view.setUint16(offset, 0, true);
        offset += 2;
      }
      downloadBlob(filename, new Blob([buffer], { type: "application/octet-stream" }));
    }

    function exportRemainingStl() {
      let triangles;
      if (state.smoothVolume) {
        const result = latestVoxelResult || computeVoxelResult();
        const geometry = smoothedVoxelSurfaceGeometry(result.remaining, result.dx, result.dy, result.dPlaneY);
        triangles = geometryToTriangles(geometry);
        geometry.dispose();
      }
      if (!triangles) {
        const result = computeVoxelResult();
        triangles = voxelSurfaceTriangles(result.remaining, result.dx, result.dy, result.dPlaneY);
      }
      const header = state.smoothVolume
        ? "remaining_chamfer_volume smoothed voxel surface, units: meters"
        : "remaining_chamfer_volume voxel surface, units: meters";
      exportTrianglesAsStl(triangles, "remaining_chamfer_volume.stl", header);
    }

    function toSketchupStlAxes(vertex) {
      return [-vertex[0], vertex[2], vertex[1]];
    }

    function triangleNormal(a, b, c) {
      const ux = b[0] - a[0];
      const uy = b[1] - a[1];
      const uz = b[2] - a[2];
      const vx = c[0] - a[0];
      const vy = c[1] - a[1];
      const vz = c[2] - a[2];
      const nx = uy * vz - uz * vy;
      const ny = uz * vx - ux * vz;
      const nz = ux * vy - uy * vx;
      const length = Math.hypot(nx, ny, nz) || 1;
      return [nx / length, ny / length, nz / length];
    }

    function setMetrics(total, cut, remain) {
      const ratio = total > 0 ? Math.max(0, Math.min(100, remain / total * 100)) : 0;
      document.querySelector("#totalVolume").textContent = total.toFixed(1);
      document.querySelector("#cutVolume").textContent = cut.toFixed(1);
      document.querySelector("#remainVolume").textContent = remain.toFixed(1);
      document.querySelector("#remainRatio").textContent = `${ratio.toFixed(0)}%`;
      document.querySelector("#remainRatioCard").style.setProperty("--ratio-fill", `${ratio}%`);
    }

    function bindControls() {
      for (const wrapper of document.querySelectorAll(".control[data-param]")) {
        const key = wrapper.dataset.param;
        const number = wrapper.querySelector("input[type='number']");
        const range = wrapper.querySelector("input[type='range']");
        number.value = state[key];
        range.value = state[key];
        const setValue = value => {
          const parsed = Number(value);
          if (!Number.isFinite(parsed)) return;
          state[key] = parsed;
          number.value = parsed;
          range.value = parsed;
          updateScene();
        };
        number.addEventListener("change", () => setValue(number.value));
        range.addEventListener("input", () => setValue(range.value));
      }

      for (const key of ["cargoEnabled", "smoothVolume", "showRemaining", "showIntersection", "showSwept"]) {
        const input = document.querySelector(`#${key}`);
        input.checked = state[key];
        input.addEventListener("change", () => {
          state[key] = input.checked;
          if (key === "smoothVolume") syncSmoothModeControls();
          updateScene();
        });
      }
    }

    function setControlValue(key, value) {
      const wrapper = document.querySelector(`.control[data-param="${key}"]`);
      if (!wrapper) return false;
      const number = wrapper.querySelector("input[type='number']");
      const range = wrapper.querySelector("input[type='range']");
      const min = Number(range.min);
      const max = Number(range.max);
      const step = Number(range.step) || 0.1;
      const clamped = Math.max(min, Math.min(max, value));
      const rounded = Math.round(clamped / step) * step;
      const normalized = Number(rounded.toFixed(4));
      state[key] = normalized;
      number.value = normalized;
      range.value = normalized;
      return true;
    }

    function convertUnitToMeters(amount, unitUrl) {
      const unitId = String(unitUrl || "").split("/").pop();
      const value = Number(amount);
      if (!Number.isFinite(value)) return null;
      const multipliers = {
        Q11573: 1,
        Q174789: 0.001,
        Q174728: 0.01,
        Q3710: 0.3048,
        Q218593: 0.0254
      };
      return value * (multipliers[unitId] ?? 1);
    }

    async function wikidataSearch(query, language) {
      const url = new URL("https://www.wikidata.org/w/api.php");
      url.search = new URLSearchParams({
        action: "wbsearchentities",
        search: query,
        language,
        uselang: language,
        format: "json",
        origin: "*",
        limit: "6"
      }).toString();
      const response = await fetch(url);
      if (!response.ok) throw new Error("搜索服务暂时不可用");
      const data = await response.json();
      return data.search || [];
    }

    async function fetchWikidataDimensions(entityId) {
      const query = `
        SELECT ?itemLabel ?length ?lengthUnit ?width ?widthUnit ?height ?heightUnit ?wheelbase ?wheelbaseUnit WHERE {
          VALUES ?item { wd:${entityId} }
          OPTIONAL { ?item p:P2043/psv:P2043 ?lengthNode. ?lengthNode wikibase:quantityAmount ?length; wikibase:quantityUnit ?lengthUnit. }
          OPTIONAL { ?item p:P2049/psv:P2049 ?widthNode. ?widthNode wikibase:quantityAmount ?width; wikibase:quantityUnit ?widthUnit. }
          OPTIONAL { ?item p:P2048/psv:P2048 ?heightNode. ?heightNode wikibase:quantityAmount ?height; wikibase:quantityUnit ?heightUnit. }
          OPTIONAL { ?item p:P3039/psv:P3039 ?wheelbaseNode. ?wheelbaseNode wikibase:quantityAmount ?wheelbase; wikibase:quantityUnit ?wheelbaseUnit. }
          SERVICE wikibase:label { bd:serviceParam wikibase:language "zh,en". }
        }
        LIMIT 1
      `;
      const url = new URL("https://query.wikidata.org/sparql");
      url.search = new URLSearchParams({ query, format: "json" }).toString();
      const response = await fetch(url, { headers: { Accept: "application/sparql-results+json" } });
      if (!response.ok) throw new Error("尺寸数据服务暂时不可用");
      const data = await response.json();
      const row = data.results?.bindings?.[0];
      if (!row) return null;
      return {
        label: row.itemLabel?.value || entityId,
        length: convertUnitToMeters(row.length?.value, row.lengthUnit?.value),
        width: convertUnitToMeters(row.width?.value, row.widthUnit?.value),
        height: convertUnitToMeters(row.height?.value, row.heightUnit?.value),
        wheelbase: convertUnitToMeters(row.wheelbase?.value, row.wheelbaseUnit?.value)
      };
    }

    function normalizeDimensionUnit(value, unit) {
      const number = Number(String(value).replace(",", "."));
      if (!Number.isFinite(number)) return null;
      const normalizedUnit = String(unit || "").toLowerCase();
      if (/mm|毫米/.test(normalizedUnit)) return number / 1000;
      if (/cm|厘米/.test(normalizedUnit)) return number / 100;
      if (/inch|in|英寸/.test(normalizedUnit)) return number * 0.0254;
      if (/ft|feet|foot|英尺/.test(normalizedUnit)) return number * 0.3048;
      if (/m|米/.test(normalizedUnit)) return number;
      if (number > 80) return number / 1000;
      return number;
    }

    function findLabeledDimension(text, labels) {
      const labelPattern = labels.join("|");
      const regex = new RegExp(`(?:${labelPattern})[^0-9\\n\\r]{0,24}([0-9]+(?:[.,][0-9]+)?)\\s*(mm|毫米|cm|厘米|m|米|inch|in|英寸|ft|feet|foot|英尺)?`, "i");
      const match = text.match(regex);
      return match ? normalizeDimensionUnit(match[1], match[2]) : null;
    }

    function parseDimensionTriplet(text) {
      const regex = /(?:外形尺寸|整车尺寸|车辆尺寸|尺寸|长宽高|长×宽×高|长x宽x高|l\s*[x×/]\s*w\s*[x×/]\s*h|dimensions|overall dimensions)[^0-9\n\r]{0,32}([0-9]+(?:[.,][0-9]+)?)\s*[x×*\/]\s*([0-9]+(?:[.,][0-9]+)?)\s*[x×*\/]\s*([0-9]+(?:[.,][0-9]+)?)\s*(mm|毫米|cm|厘米|m|米|inch|in|英寸|ft|feet|foot|英尺)?/i;
      const match = text.match(regex);
      if (!match) return {};
      return {
        length: normalizeDimensionUnit(match[1], match[4]),
        width: normalizeDimensionUnit(match[2], match[4]),
        height: normalizeDimensionUnit(match[3], match[4])
      };
    }
