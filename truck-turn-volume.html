      apply("deckHeight", dimensions.deckHeight);
      apply("wheelTrack", dimensions.wheelTrack);
      apply("wheelWidth", dimensions.wheelWidth);
      apply("wheelRadius", dimensions.wheelRadius);
      apply("sideProtrusion", dimensions.sideProtrusion);
      apply("cargoLength", dimensions.cargoLength);
      apply("cargoFrontOverhang", dimensions.cargoFrontOverhang);
      apply("cargoBaseOffset", dimensions.cargoBaseOffset);
      apply("cargoHeight", dimensions.cargoHeight);

      if (!dimensions.wheelTrack && dimensions.width) apply("wheelTrack", dimensions.width * 0.82);
      if (dimensions.wheelbase && dimensions.length) {
        const rearOverhang = dimensions.length - state.cabFrontOverhang - dimensions.wheelbase;
        if (rearOverhang > 0) apply("cabRearOverhang", rearOverhang);
      }
      return [...new Set(applied)];
    }

    function parseManualDimensionText() {
      const text = document.querySelector("#vehicleDimensionText").value.trim();
      const status = document.querySelector("#vehicleLookupStatus");
      status.dataset.customStatus = "true";
      if (!text) {
        status.textContent = tr("pasteFirst");
        return;
      }
      const dimensions = parseDimensionsFromText(text);
      const applied = applyParsedDimensions(dimensions);
      if (applied.length) {
        updateScene();
        status.textContent = tr("parsedApplied", applied);
      } else {
        status.textContent = tr("parsedNone");
      }
    }

    async function lookupVehicle() {
      const input = document.querySelector("#vehicleSearchQuery");
      const status = document.querySelector("#vehicleLookupStatus");
      const button = document.querySelector("#vehicleSearchButton");
      const query = input.value.trim();
      status.dataset.customStatus = "true";
      if (!query) {
        status.textContent = tr("enterModel");
        return;
      }
      button.disabled = true;
      status.textContent = tr("searching");
      try {
        const results = [
          ...(await wikidataSearch(query, "zh")),
          ...(await wikidataSearch(query, "en"))
        ];
        const seen = new Set();
        for (const result of results) {
          if (!result.id || seen.has(result.id)) continue;
          seen.add(result.id);
          const dimensions = await fetchWikidataDimensions(result.id);
          if (!dimensions) continue;
          const hasUsableData = [dimensions.length, dimensions.width, dimensions.height, dimensions.wheelbase].some(Boolean);
          if (!hasUsableData) continue;
          const applied = applyVehicleDimensions(dimensions);
          if (applied.length) {
            updateScene();
            status.textContent = tr("matched", dimensions.label, applied);
            return;
          }
        }
        status.textContent = tr("noUsableData");
      } catch (error) {
        status.textContent = tr("lookupFailed", error.message);
      } finally {
        button.disabled = false;
      }
    }

    let playing = false;
    let lastTime = 0;
    function animate(time) {
      requestAnimationFrame(animate);
      controls.update();
      if (playing) {
        if (!lastTime) lastTime = time;
        const delta = time - lastTime;
        lastTime = time;
        state.progress = (state.progress + delta * 0.018) % 101;
        syncProgressInputs();
        buildTruck();
      } else {
        lastTime = time;
      }
      renderer.render(scene, activeCamera);
      axisGroup.quaternion.copy(activeCamera.quaternion).invert();
      axisRenderer.render(axisScene, axisCamera);
      if (remainingViewer.isOpen) {
        remainingControls.update();
        remainingRenderer.render(remainingScene, remainingCamera);
      }
      if (savedVolumeViewer.isOpen) {
        savedVolumeControls.update();
        savedVolumeRenderer.render(savedVolumeScene, savedVolumeCamera);
      }
      if (heatmapViewer.isOpen) {
        heatmapControls.update();
        heatmapRenderer.render(heatmapScene, heatmapCamera);
      }
    }

    function syncProgressInputs() {
      const wrapper = document.querySelector('.control[data-param="progress"]');
      const value = Math.round(state.progress);
      wrapper.querySelector("input[type='number']").value = value;
      wrapper.querySelector("input[type='range']").value = value;
    }

    function syncSmoothModeControls() {
      const checkbox = document.querySelector("#smoothVolume");
      const button = document.querySelector("#toggleSmoothVolume");
      checkbox.checked = state.smoothVolume;
      button.classList.toggle("is-active", state.smoothVolume);
      button.querySelector("span").textContent = state.smoothVolume ? tr("smoothButton") : tr("voxelButton");
      button.setAttribute("aria-label", state.smoothVolume ? tr("smoothAria") : tr("voxelAria"));
      button.setAttribute("aria-pressed", String(state.smoothVolume));
    }

    document.querySelector("#playButton").addEventListener("click", event => {
      playing = !playing;
      const label = event.currentTarget.querySelector("span");
      label.textContent = playing ? tr("pause") : tr("play");
      event.currentTarget.setAttribute("aria-label", playing ? tr("pause") : tr("play"));
    });
    document.querySelector("#toggleSmoothVolume").addEventListener("click", () => {
      state.smoothVolume = !state.smoothVolume;
      syncSmoothModeControls();
      updateScene();
    });
    document.querySelector("#vehicleSearchButton").addEventListener("click", lookupVehicle);
    document.querySelector("#vehicleSearchQuery").addEventListener("keydown", event => {
      if (event.key === "Enter") lookupVehicle();
    });
    document.querySelector("#parseDimensionButton").addEventListener("click", parseManualDimensionText);
    document.querySelector("#languageToggle").addEventListener("click", () => {
      applyLanguage(currentLanguage === "jp" ? "cn" : "jp");
    });
    remainingViewer.openButton.addEventListener("click", openRemainingViewer);
    remainingViewer.closeButton.addEventListener("click", closeRemainingViewer);
    remainingViewer.resetButton.addEventListener("click", () => refreshRemainingViewer(true));
    document.querySelector("#saveRemainingVolume").addEventListener("click", saveCurrentRemainingVolume);
    savedVolumeViewer.closeButton.addEventListener("click", closeSavedVolumeViewer);
    heatmapViewer.openButton.addEventListener("click", openHeatmapViewer);
    heatmapViewer.closeButton.addEventListener("click", closeHeatmapViewer);
    heatmapViewer.threshold.addEventListener("input", () => {
      updateHeatmapThresholdLabel();
    });
    heatmapViewer.exportButton.addEventListener("click", exportHeatmapStl);
    document.querySelector("#exportStl").addEventListener("click", exportRemainingStl);
    document.querySelector("#topViewCamera").addEventListener("click", () => setTopView(!topViewActive));
    document.querySelector("#resetCamera").addEventListener("click", resetCamera);
    window.addEventListener("keydown", event => {
      if (event.key === "Escape" && remainingViewer.isOpen) closeRemainingViewer();
      if (event.key === "Escape" && savedVolumeViewer.isOpen) closeSavedVolumeViewer();
      if (event.key === "Escape" && heatmapViewer.isOpen) closeHeatmapViewer();
    });

    function resize() {
      const rect = canvas.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / Math.max(1, rect.height);
      camera.updateProjectionMatrix();
      updateTopCameraProjection();
      resizeAxisGizmo();
      resizeRemainingViewer();
      resizeSavedVolumeViewer();
      resizeHeatmapViewer();
    }

    window.addEventListener("resize", resize);
    bindControls();
    resize();
    applyLanguage("jp");
    updateScene();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
